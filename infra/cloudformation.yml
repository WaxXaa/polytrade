AWSTemplateFormatVersion: '2010-09-09'
Description: Polymarket Copy Trading Agent — ECS Fargate + ALB + Secrets Manager

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  BackendImage:
    Type: String
    Description: ECR image URI for the backend (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/polymarket-backend:latest)

  FrontendImage:
    Type: String
    Description: ECR image URI for the frontend (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/polymarket-frontend:latest)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets in different AZs

  CertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for HTTPS (optional)

Resources:

  # ─── Secrets Manager ────────────────────────────────────────────────────────

  AgentSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub polymarket-agent-secrets-${Environment}
      Description: Private key and CLOB credentials for the Polymarket copy trading agent
      SecretString: !Sub |
        {
          "PRIVATE_KEY": "REPLACE_WITH_YOUR_PRIVATE_KEY",
          "CLOB_API_KEY": "",
          "CLOB_SECRET": "",
          "CLOB_PASSPHRASE": ""
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── ECS Cluster ────────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub polymarket-agent-${Environment}
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1

  # ─── ECR Repositories ───────────────────────────────────────────────────────

  BackendECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub polymarket-backend-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {"tagStatus": "any", "countType": "imageCountMoreThan", "countNumber": 10},
              "action": {"type": "expire"}
            }]
          }

  FrontendECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub polymarket-frontend-${Environment}
      ImageScanningConfiguration:
        ScanOnPush: true

  # ─── IAM Roles ──────────────────────────────────────────────────────────────

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub polymarket-ecs-execution-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AgentSecrets

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub polymarket-ecs-task-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AgentSecrets

  # ─── Security Groups ─────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — allow HTTP/HTTPS from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3001
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  FrontendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Frontend ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  # ─── Application Load Balancer ───────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub polymarket-alb-${Environment}
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups: [!Ref ALBSecurityGroup]

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub polymarket-backend-tg-${Environment}
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub polymarket-frontend-tg-${Environment}
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  # Route /api/* and /ws/* to backend
  BackendListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/api/*', '/ws/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ─── CloudWatch Log Groups ───────────────────────────────────────────────────

  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/polymarket-backend-${Environment}
      RetentionInDays: 30

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/polymarket-frontend-${Environment}
      RetentionInDays: 14

  # ─── EFS for SQLite persistence ──────────────────────────────────────────────

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub polymarket-data-${Environment}

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: [!Ref BackendSecurityGroup]

  # ─── ECS Task Definitions ────────────────────────────────────────────────────

  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub polymarket-backend-${Environment}
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      Volumes:
        - Name: efs-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref EFSFileSystem
            RootDirectory: /
            TransitEncryption: ENABLED
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImage
          PortMappings:
            - ContainerPort: 3000
            - ContainerPort: 3001
          Environment:
            - Name: PORT
              Value: '3000'
            - Name: WS_PORT
              Value: '3001'
            - Name: DB_PATH
              Value: file:/data/agent.db
            - Name: AWS_REGION
              Value: us-east-1
            - Name: AWS_SECRET_NAME
              Value: !Sub polymarket-agent-secrets-${Environment}
            - Name: NODE_ENV
              Value: production
          MountPoints:
            - ContainerPath: /data
              SourceVolume: efs-data
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
          HealthCheck:
            Command: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/status || exit 1']
            Interval: 30
            Timeout: 5
            Retries: 3

  FrontendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub polymarket-frontend-${Environment}
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: !Ref FrontendImage
          PortMappings:
            - ContainerPort: 80
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref FrontendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: frontend

  # ─── ECS Services ────────────────────────────────────────────────────────────

  BackendService:
    Type: AWS::ECS::Service
    DependsOn: BackendListenerRule
    Properties:
      ServiceName: !Sub polymarket-backend-${Environment}
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref BackendSecurityGroup]
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 3000
          TargetGroupArn: !Ref BackendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub polymarket-frontend-${Environment}
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref FrontendSecurityGroup]
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 80
          TargetGroupArn: !Ref FrontendTargetGroup

Outputs:
  ALBDnsName:
    Description: URL del Application Load Balancer
    Value: !Sub http://${ALB.DNSName}
    Export:
      Name: !Sub polymarket-alb-url-${Environment}

  BackendECRUri:
    Description: URI del repositorio ECR del backend
    Value: !GetAtt BackendECR.RepositoryUri

  FrontendECRUri:
    Description: URI del repositorio ECR del frontend
    Value: !GetAtt FrontendECR.RepositoryUri

  SecretArn:
    Description: ARN del secret en Secrets Manager
    Value: !Ref AgentSecrets
    Export:
      Name: !Sub polymarket-secret-arn-${Environment}
